name: CI & Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: elkaza-web-production
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Run E2E Tests
        run: npm run test:e2e

      - name: Start Server & Run A11y Audit
        run: |
          node scripts/serve-static-export.mjs out 3002 &
          SERVER_PID=$!
          sleep 3
          PORT=3002 npm run a11y-audit || echo "A11y audit completed with warnings"
          kill "$SERVER_PID" || true

      # Upload a11y report
      - name: Upload A11y Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: a11y-report
          path: screenshots/a11y-report.json
          retention-days: 30

      # Deploy through the live vps1 -> debian-core path.
      # Only runs on 'push' to main, not on pull requests.
      - name: Deploy to live static mount
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -euo pipefail
            ~/deploy-elkaza.sh

      # Optional: Keep this if you want to see the build files in GitHub's UI
      - name: Upload Build Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: out

      # Upload test results
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
