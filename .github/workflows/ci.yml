name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
      - name: Run bundle analyzer (PR only)
        if: github.event_name == 'pull_request'
        env:
          ANALYZE: 'true'
        run: npx next build --webpack
      - name: Upload analyzer reports (PR only)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: next-analyze
          path: .next/analyze
      - name: Upload Next build cache
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next
